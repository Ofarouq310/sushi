<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./public/sushi.png">
  <link rel="stylesheet" href="./src/css/style.css">
  <title>Sushi website</title>
</head>
<body>
  <header>
    <nav class="header__nav">

      <div class="nav__logo">
        <h4>Sushi</h4>
      </div>

      <uL class="nav__menu">
        <li>
          <a href="#menu">Menu</a>
        </li>
        <li>
          <a href="#food">Food</a>
        </li>
        <li>
          <a href="#services">Services</a>
        </li>
        <li>
          <a href="#about">About us</a>
        </li>
        <li>
          <img src="./src/assets/search.svg" />
        </li>
      </uL>
    </nav>
  </header>

  <section class="hero">
    <div class="hero__image">
      <img src="src/assets/sushi-1.png" />
      <h2>日 <br />
      本 <br />
      食</h2>
      <div class="hero-image__overlay"></div>
    </div>
    <div class="hero__content">
      <div class="hero__info">
        <h1>Feel the taste of Japanese foods</h1>
        <p>Feel the taste of the most popular Japanese foods from anywhere and
        anytime.</p>
        <div class="hero__buttons">
          <button class="hero__order-button">Order Now</button>
          <button class="hero__play-button">
            <img src="src/assets/play-circle.svg" alt="play" />
            How to Order
          </button>
        </div>
      </div>

      <div class="hero__testimonial">
        <div class="testimonial__customer">
          <h4>24<span>k+</span></h4>
          <p>Happy Customers</p>
        </div>

        <div class="testimonial__review">
          <img src="src/assets/user.png" />
          <p>“This is the best Japanese food delivery service that ever existed.”</p>
        </div>
      </div>

    </div>
  </section>

  <script src="./src/js/script.js" type="module"></script>
</body>
</html>
